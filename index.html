<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="src/output.css">
    <title>Mundo Pet</title>
</head>
<body class="relative bg-background-page">
    <header class="w-44 bg-background-logo p-5 rounded-br-xl">
        <a href="index.html">
            <img src="src/Images/Logo.svg" alt="Logo do Mundo pet">
        </a>
    </header>
    <main class="max-w-[800px] w-full mx-auto px-10 py-8 mobile:min-h-[90vh] mobile:px-20 mobile:py-14">
        <section>
            <header class="flex flex-wrap items-center justify-between gap-3">
                <div class="basis-44 flex-1">
                    <h1 class="title text-content-primary">
                        Sua agenda
                    </h1>
                    <p class="pMedium text-content-secondary">Aqui você pode ver todos os clientes e serviços agendados para hoje.</p>
                </div>
                <button class="button w-44 basis-44 flex items-center gap-2 rounded-[8px] p-3 border border-border-primary text-content-secondary">
                    <img src="src/Images/Calendar.svg" alt="Calendário">
                    <p><!-- colocar dia da página por js -->10/01/2024</p>
                    <img src="src/Images/Arrow.svg" alt="Abrir">
                </button>
            </header>
            <div class="max-w-[720px] min-h-full my-8">
                <section class="overflow-auto">
                    <div class="rounded-[10px] bg-background-tertiary">
                        <div class="flex justify-between items-center py-3 px-5 border-b border-border-primary">
                            <figure class="flex items-center gap-3">
                                <img class="w-5 h-5" src="src/Images/Morning.svg" alt="Manhã">
                                <p class="lLarge text-content-primary"><!-- texto por js -->Manhã</p>
                            </figure>
                            <p class="lLarge text-content-secondary"><!-- texto por js -->09h-12h</p>
                        </div>
                        <div class="p-3">
                            <div class="grid items-center justify-items-center gap-3 p-5 mobile:grid-cols-[repeat(2,_minmax(100px,_230px))] tablet:grid-cols-[repeat(3,_minmax(100px,_230px))]">
                                <div class="flex items-center gap-4">
                                    <p class="lMedium text-content-primary"><!-- horas do começo do atendimento, por js -->09h</p>
                                    <p class="lSmall text-content-primary mobile:text-ellipsis mobile:line-clamp-2"><!--nome da pessoa-->Thor <span class="pSmall text-content-secondary">/Fernanda Costa</span></p>
                                </div>
                                <p class="pSmall text-content-secondary"><!--o que vai fazer-->Vacinação</p>
                                <button class="pSmall text-content-secondary mobile:col-start-1 mobile:col-end-3 tablet:col-start-3 tablet:col-end-4">Remover agendamento</button>
                            </div>
                            <!-- está desalinhado com o primeiro, preciso de uma solução caso achar feio -->
                            <div class="grid items-center justify-items-center gap-3 p-5 border-t border-border-primary mobile:grid-cols-[repeat(2,_minmax(100px,_230px))] tablet:grid-cols-[repeat(3,_minmax(100px,_230px))]">
                                <div class="flex items-center gap-4">
                                    <p class="lMedium text-content-primary"><!-- horas do começo do atendimento, por js -->10h</p>
                                    <p class="lSmall text-content-primary"><!--nome do cachorro e da pessoa-->Mel <span class="pSmall text-content-secondary">/João Souza</span></p>
                                </div>
                                <p class="pSmall text-content-secondary"><!--o que vai fazer-->Corte de Unhas</p>
                                <button class="pSmall text-content-secondary mobile:col-start-1 mobile:col-end-3 tablet:col-start-3 tablet:col-end-4">Remover agendamento</button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </section>
        <form action="#" method="#" class="min-w-[300px] max-w-[800px] w-[500px] p-10 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-background-tertiary grid gap-7 rounded-lg">
            <div>
                <h1 class="title text-content-primary">Agende um atendimento</h1>
                <p class="pMedium text-content-secondary">Preencha os dados do cliente para realizar o agendamento:</p>
            </div>

            <div class="grid gap-4">
                <div>
                    <label class="block lMedium text-content-primary pb-1" for="name_tutor">Nome do tutor</label>
                    <div class="relative">
                        <input type="text" class="border rounded-xl py-3 pl-10 w-full bg-transparent" id="name_tutor" name="name_tutor" placeholder="Helena Souza" required>
                        <img src="src/Images/User.svg" class="absolute top-1/2 left-3 transform -translate-y-1/2">
                    </div>
                </div>
    
                <div>
                    <label class="block lMedium text-content-primary pb-1" for="name_pet">Nome do pet</label>
                    <div class="relative">
                        <input type="text" class="border rounded-xl py-3 pl-10 w-full bg-transparent" id="name_pet" name="name_pet" placeholder="Cheddar" required>
                        <img src="src/Images/Pet.svg" class="absolute top-1/2 left-3 transform -translate-y-1/2">
                    </div>
                </div>
    
                <div>
                    <label class="block lMedium text-content-primary pb-1" for="phone">Telefone</label>
                    <div class="relative">
                        <input type="tel" class="border rounded-xl py-3 pl-10 w-full bg-transparent" id="phone" name="phone" placeholder="(00) 0 0000-0000" pattern="\d{2}\d{5}\d{4}" required>
                        <img src="src/Images/Phone.svg" class="absolute top-1/2 left-3 transform -translate-y-1/2">
                    </div>
                </div>
    
                <div>
                    <label class="block lMedium text-content-primary pb-1" for="description">Descrição do serviço</label>
                    <textarea class="resize-none border rounded-xl py-3 pl-4 h-20 w-full bg-transparent" id="description" name="description" placeholder="Banho e tosa" required></textarea>
                </div>
                
                <div class="flex justify-between w-full gap-4">
                    <div class="w-6/12">
                        <label class="block lMedium text-content-primary pb-1" for="date">Data</label>
                        <div class="relative">
                            <input class="border rounded-xl py-3 pl-10 w-full bg-transparent js-inputDate" type="text" id="date" name="date" placeholder="DD/MM/AAAA" required>
                            <img src="src/Images/Clock.svg" class="absolute top-1/2 left-3 transform -translate-y-1/2">
                        </div>
                    </div>
                    
                    <div class="w-6/12">
                        <label class="block lMedium text-content-primary pb-1" for="hour">Hora</label>
                        <!-- quando clicar nesse input poderia abrir uma notificação falando que é das 9 as 9 da noite -->
                         <div class="relative">
                            <input class="border rounded-xl py-3 pl-10 w-full bg-transparent js-inputHour" type="text" id="hour" name="hour" placeholder="12:00" required>
                            <img src="src/Images/Clock.svg" class="absolute top-1/2 left-3 transform -translate-y-1/2">
                         </div>
                    </div>
                    
                </div>
            </div>
            <input type="submit" class="w-1/4 py-3 px-6 justify-self-end bg-content-brand rounded-lg" value="Agendar">
        </form>
    </main>
    <footer class="flex flex-col justify-center items-center p-5 bg-background-tertiary mobile:absolute mobile:bottom-7 mobile:right-7 mobile:bg-none mobile:p-0">
        <button class="lLarge bg-content-brand py-3 px-6 rounded-lg shadow-blur">Novo agendamento</button>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/pt-br.js"></script>
    <script src="src/script.js"></script>
</body>
</html>
